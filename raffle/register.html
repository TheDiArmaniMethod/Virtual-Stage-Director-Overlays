<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 — Raffle Registration Form -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raffle Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #432818;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────────────────── */
        #header {
            padding: 36px 24px 28px;
            text-align: center;
            flex-shrink: 0;
        }

        #logo {
            max-width: 200px;
            max-height: 130px;
            object-fit: contain;
            margin-bottom: 18px;
            display: none;
        }

        #org-name {
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 0.4px;
            color: #ffe6a7;
            margin-bottom: 5px;
        }

        #event-name {
            font-size: 13px;
            font-weight: 400;
            color: rgba(255, 230, 167, 0.7);
        }

        /* ── Form Card ───────────────────────────────────── */
        #card {
            background: #ffffff;
            border-radius: 24px 24px 0 0;
            padding: 32px 24px 52px;
            flex: 1;
        }

        #card-title {
            font-size: 22px;
            font-weight: 700;
            color: #432818;
            text-align: center;
            margin-bottom: 6px;
        }

        #card-subtitle {
            font-size: 14px;
            color: #999;
            text-align: center;
            margin-bottom: 32px;
        }

        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #432818;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 16px;
            font-size: 18px;
            color: #222;
            background: #f7f7f7;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            -webkit-appearance: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #432818;
            background: #fff;
        }

        #error-msg {
            min-height: 20px;
            font-size: 13px;
            color: #941b0c;
            text-align: center;
            margin-bottom: 4px;
        }

        #submit-btn {
            width: 100%;
            padding: 17px;
            background: #941b0c;
            color: #ffe6a7;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.3px;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: 6px;
            transition: opacity 0.15s;
        }

        #submit-btn:active { opacity: 0.85; }
        #submit-btn:disabled { background: #ccc; color: #fff; cursor: not-allowed; }

        /* ── Confirmation ────────────────────────────────── */
        #confirmation {
            display: none;
            text-align: center;
            padding: 20px 0 16px;
        }

        #confirmation .emoji { font-size: 72px; margin-bottom: 20px; }

        #confirmation-msg {
            font-size: 24px;
            font-weight: 700;
            color: #345830;
            line-height: 1.35;
        }

        /* ── Closed ──────────────────────────────────────── */
        #closed-view {
            display: none;
            text-align: center;
            padding: 32px 0;
        }

        #closed-view .emoji { font-size: 52px; margin-bottom: 16px; }
        #closed-view .text  { font-size: 19px; font-weight: 600; color: #aaa; }

        /* ── Loading ─────────────────────────────────────── */
        #loading-view {
            text-align: center;
            padding: 32px 0;
            color: #bbb;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div id="header">
    <img id="logo" src="" alt="">
    <div id="org-name">Loading…</div>
    <div id="event-name"></div>
</div>

<div id="card">

    <div id="loading-view">Loading…</div>

    <div id="closed-view">
        <div class="emoji">🔒</div>
        <div class="text">Registration is currently closed.</div>
    </div>

    <div id="form-view" style="display:none;">
        <div id="card-title">Enter the Raffle</div>
        <div id="card-subtitle">Enter your name for a chance to win!</div>

        <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" placeholder="Your first name"
                   autocomplete="given-name" autocorrect="off" autocapitalize="words">
        </div>
        <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" placeholder="Your last name"
                   autocomplete="family-name" autocorrect="off" autocapitalize="words">
        </div>

        <div id="error-msg"></div>
        <button id="submit-btn">Enter Raffle</button>
    </div>

    <div id="confirmation">
        <div class="emoji">🎉</div>
        <div id="confirmation-msg">Congratulations! You're Entered to Win!</div>
    </div>

</div>

<script>
// Resolve API URL relative to this file's location
const API = 'api.php';

// ── Load event config ────────────────────────────────────────────────
fetch(API + '?action=status')
    .then(function(r) { return r.json(); })
    .then(function(d) {
        document.getElementById('loading-view').style.display = 'none';

        if (!d.success) { showClosed(); return; }

        // Branding
        document.title = d.eventName || 'Raffle Registration';
        document.getElementById('org-name').textContent   = d.orgName   || '';
        document.getElementById('event-name').textContent = d.eventName || '';

        if (d.logoUrl) {
            var logo = document.getElementById('logo');
            logo.src = d.logoUrl;
            logo.style.display = 'block';
        }

        // Dynamic colours
        var hdr = document.getElementById('header');
        hdr.style.background = d.colorPrimary || '#432818';
        document.body.style.background = d.colorPrimary || '#432818';

        document.getElementById('org-name').style.color = d.colorAccent || '#ffe6a7';
        document.getElementById('event-name').style.color = (d.colorAccent || '#ffe6a7') + 'b3';

        document.getElementById('card-title').style.color   = d.colorPrimary || '#432818';
        document.querySelectorAll('label').forEach(function(el) {
            el.style.color = d.colorPrimary || '#432818';
        });
        document.querySelectorAll('input[type=text]').forEach(function(el) {
            el._focusBorderColor = d.colorPrimary || '#432818';
        });

        var btn = document.getElementById('submit-btn');
        btn.style.background = d.colorHighlight || '#941b0c';
        btn.style.color      = d.colorAccent    || '#ffe6a7';

        document.getElementById('error-msg').style.color    = d.colorHighlight || '#941b0c';
        document.getElementById('confirmation-msg').style.color = d.colorSecondary || '#345830';
        document.getElementById('confirmation-msg').textContent = d.confirmationMsg || "Congratulations! You're Entered to Win!";

        if (d.isOpen) {
            document.getElementById('form-view').style.display = 'block';
        } else {
            showClosed();
        }
    })
    .catch(function() {
        document.getElementById('loading-view').style.display = 'none';
        showClosed();
    });

function showClosed() {
    document.getElementById('closed-view').style.display = 'block';
}

// ── Apply focus colour dynamically ──────────────────────────────────
document.querySelectorAll('input[type=text]').forEach(function(el) {
    el.addEventListener('focus', function() {
        el.style.borderColor = el._focusBorderColor || '#432818';
    });
    el.addEventListener('blur', function() {
        el.style.borderColor = '#e8e8e8';
    });
});

// ── Form submission ──────────────────────────────────────────────────
document.getElementById('submit-btn').addEventListener('click', submitForm);
document.getElementById('lastName').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') submitForm();
});

function submitForm() {
    var first = document.getElementById('firstName').value.trim();
    var last  = document.getElementById('lastName').value.trim();
    var errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!first) { errEl.textContent = 'Please enter your first name.'; return; }
    if (!last)  { errEl.textContent = 'Please enter your last name.'; return; }

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    fetch(API + '?action=register', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name: first + ' ' + last })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        if (d.success) {
            document.getElementById('form-view').style.display = 'none';
            document.getElementById('confirmation').style.display = 'block';
        } else {
            errEl.textContent = d.error || 'Something went wrong. Please try again.';
            btn.disabled = false;
            btn.textContent = 'Enter Raffle';
        }
    })
    .catch(function() {
        errEl.textContent = 'Connection error. Please try again.';
        btn.disabled = false;
        btn.textContent = 'Enter Raffle';
    });
}
</script>

</body>
</html>
