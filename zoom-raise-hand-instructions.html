<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

#container{
  position:absolute;
  bottom:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:1600px;
  background:var(--bg-color);
  border-radius:20px;padding:50px;
  display:flex;align-items:center;justify-content:center;gap:50px;
  backdrop-filter:blur(10px);
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  animation:fadeInUp 0.6s ease-out;
}

/* Animated hand icon */
#hand-icon{
  flex-shrink:0;width:130px;height:130px;
  display:flex;align-items:center;justify-content:center;
  font-size:96px;
  animation:wave 2s ease-in-out infinite;
  filter:drop-shadow(2px 2px 8px rgba(0,0,0,0.3));
}

#text-content{flex:1;color:#fff}
#headline{font-size:64px;font-weight:700;margin-bottom:18px;text-shadow:2px 2px 8px rgba(0,0,0,0.3);line-height:1.2}
#subtext{font-size:40px;font-weight:400;opacity:0.95;text-shadow:1px 1px 4px rgba(0,0,0,0.2);line-height:1.4}

/* Shortcut section */
#shortcut{
  flex-shrink:0;display:flex;flex-direction:column;gap:20px;
  border-left:2px solid rgba(255,255,255,0.2);padding-left:50px;
}
.shortcut-label{font-size:20px;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.keys{display:flex;align-items:center;gap:10px}
.key{
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.5);
  border-bottom:4px solid rgba(0,0,0,0.2);
  border-radius:10px;padding:10px 22px;
  font-size:28px;font-weight:700;color:#fff;
  text-shadow:1px 1px 2px rgba(0,0,0,0.3);
  box-shadow:0 4px 0 rgba(0,0,0,0.15);
}
.plus{font-size:26px;color:rgba(255,255,255,0.6);font-weight:300}

/* "Or" divider */
.or-row{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,0.5);font-size:18px}
.or-row::before,.or-row::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.2)}

.find-it{font-size:22px;color:rgba(255,255,255,0.8);line-height:1.5;text-align:center}
.find-it strong{color:#fff}

@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes wave{0%,100%{transform:rotate(0deg)}15%{transform:rotate(-20deg)}30%{transform:rotate(15deg)}45%{transform:rotate(-10deg)}60%{transform:rotate(5deg)}75%{transform:rotate(0deg)}}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>
<div id="container">
  <div id="hand-icon">✋</div>

  <div id="text-content">
    <div id="headline">Raise Your Hand to Speak</div>
    <div id="subtext">Click <strong>Reactions</strong> in your Zoom toolbar, then click <strong>Raise Hand</strong> — the host will invite you when it's your turn</div>
  </div>

  <div id="shortcut">
    <div>
      <div class="shortcut-label">Windows</div>
      <div class="keys">
        <div class="key">Alt</div><div class="plus">+</div><div class="key">Y</div>
      </div>
    </div>
    <div class="or-row">or</div>
    <div>
      <div class="shortcut-label">Mac</div>
      <div class="keys">
        <div class="key">⌥</div><div class="plus">+</div><div class="key">Y</div>
      </div>
    </div>
    <div class="or-row">or</div>
    <div class="find-it">Click <strong>Reactions</strong><br>→ <strong>Raise Hand</strong></div>
  </div>
</div>
</body>
</html>
