<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bullet Points Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:1920px;height:1080px;overflow:hidden;background:transparent;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

#stage{
  position:absolute;
  left:var(--pos-x,7%);
  bottom:var(--pos-y,10%);
  display:flex;
  flex-direction:column;
  gap:var(--row-gap,18px);
  pointer-events:none;
}

.row{
  display:flex;
  align-items:center;
  opacity:0;
  transform:translateX(-48px);
  transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);
}
.row.visible{opacity:1;transform:translateX(0)}
.row.hiding{opacity:0;transform:translateX(-48px);transition:opacity .3s ease-in,transform .3s ease-in}
.row.gone{display:none}

.icon-circle{
  flex-shrink:0;
  width:var(--icon-size,64px);
  height:var(--icon-size,64px);
  border-radius:50%;
  background:var(--accent-color,#ffe6a7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2;
}
.icon-circle svg{
  width:calc(var(--icon-size,64px) * .68);
  height:calc(var(--icon-size,64px) * .68);
}

.bubble-wrap{display:flex;align-items:center;margin-left:10px;}

.tail{
  flex-shrink:0;
  width:0;height:0;
  border-top:var(--tail-size,12px) solid transparent;
  border-bottom:var(--tail-size,12px) solid transparent;
  border-right:var(--tail-depth,16px) solid var(--bubble-bg,rgba(30,20,10,.88));
}

.bubble{
  background:var(--bubble-bg,rgba(30,20,10,.88));
  border-radius:var(--bubble-radius,14px);
  padding:.45em .45em 1em .85em;
  white-space:nowrap;
}
.bubble-text{
  font-size:var(--font-size,48px);
  font-weight:var(--font-weight,600);
  color:var(--text-color,#ffffff);
  letter-spacing:.01em;
  line-height:1.2;
}
</style>
</head>
<body>
<div id="stage"></div>
<script>
(function(){
  const P=new URLSearchParams(location.search);
  const p=(k,d)=>P.get(k)??d;

  const items=[];
  for(let i=1;i<=8;i++){const v=P.get('item'+i);if(v&&v.trim())items.push(v.trim());}
  if(!items.length){items.push('Think before you write.','Plan before you pour.','Build the container first.');}

  const accentColor  =p('accentColor','#ffe6a7');
  const bubbleBg     =p('bubbleBg','#1e140a');
  const bubbleOpacity=Math.min(100,Math.max(0,parseInt(p('bubbleOpacity','88'))));
  const textColor    =p('textColor','#ffffff');
  const fontSize     =p('fontSize','48');
  const fontWeight   =p('fontWeight','600');
  const iconSize     =p('iconSize','64');
  const tailSize     =p('tailSize','12');
  const tailDepth    =p('tailDepth','16');
  const bubbleRadius =p('bubbleRadius','14');
  const rowGap       =p('rowGap','18');
  const stagger      =parseInt(p('stagger','180'));
  const delay        =parseInt(p('delay','120'));
  const posX         =p('posX','7');
  const posY         =p('posY','10');
  const iconStyle    =p('iconStyle','dot');
  const customSvgD   =p('customSvgD','');
  const googleFont   =p('googleFont','');

  function hexRgba(hex,a){
    const c=hex.replace('#','');
    const f=c.length===3?c.split('').map(x=>x+x).join(''):c;
    const n=parseInt(f,16);
    return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${(a/100).toFixed(2)})`;
  }

  const bubbleBgFinal=hexRgba(bubbleBg,bubbleOpacity);

  const root=document.documentElement;
  root.style.setProperty('--accent-color', accentColor);
  root.style.setProperty('--bubble-bg',    bubbleBgFinal);
  root.style.setProperty('--text-color',   textColor);
  root.style.setProperty('--font-size',    fontSize+'px');
  root.style.setProperty('--font-weight',  fontWeight);
  root.style.setProperty('--icon-size',    iconSize+'px');
  root.style.setProperty('--tail-size',    tailSize+'px');
  root.style.setProperty('--tail-depth',   tailDepth+'px');
  root.style.setProperty('--bubble-radius',bubbleRadius+'px');
  root.style.setProperty('--row-gap',      rowGap+'px');
  root.style.setProperty('--pos-x',        posX+'%');
  root.style.setProperty('--pos-y',        posY+'%');

  if(googleFont){
    const lk=document.createElement('link');
    lk.rel='stylesheet';
    lk.href=`https://fonts.googleapis.com/css2?family=${encodeURIComponent(googleFont)}:wght@400;600;700;900&display=swap`;
    document.head.appendChild(lk);
    document.body.style.fontFamily=`'${googleFont}',sans-serif`;
  }

  const ICONS={
    dot:    '<circle cx="12" cy="12" r="5"/>',
    star:   '<polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>',
    arrow:  '<polyline points="9,18 15,12 9,6"/>',
    check:  '<polyline points="20,6 9,17 4,12"/>',
    diamond:'<polygon points="12,2 22,12 12,22 2,12"/>',
    plus:   '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  };

  function makeIcon(idx){
    const sz=parseInt(iconSize);
    const sw=Math.max(1.5,sz*0.06).toFixed(1);
    const attr=`stroke="#432818" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" fill="none"`;
    let inner='';
    if(iconStyle==='number'){
      inner=`<text x="12" y="16.5" text-anchor="middle" font-size="13" font-weight="700" fill="#432818" font-family="inherit">${idx+1}</text>`;
    } else if(iconStyle==='custom'&&customSvgD){
      inner=`<path d="${customSvgD}" ${attr}/>`;
    } else {
      inner=`<g ${attr}>${ICONS[iconStyle]||ICONS.dot}</g>`;
    }
    return `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
  }

  const stage=document.getElementById('stage');
  const els=items.map((text,i)=>{
    const row=document.createElement('div');
    row.className='row';

    const ic=document.createElement('div');
    ic.className='icon-circle';
    ic.innerHTML=makeIcon(i);

    const bw=document.createElement('div');
    bw.className='bubble-wrap';

    const tail=document.createElement('div');
    tail.className='tail';

    const bubble=document.createElement('div');
    bubble.className='bubble';

    const span=document.createElement('div');
    span.className='bubble-text';
    span.textContent=text;

    bubble.appendChild(span);
    bw.appendChild(tail);
    bw.appendChild(bubble);
    row.appendChild(ic);
    row.appendChild(bw);
    stage.appendChild(row);
    return row;
  });

  els.forEach((el,i)=>setTimeout(()=>el.classList.add('visible'),delay+i*stagger));

  window.hideAll=function(){
    els.forEach((el,i)=>setTimeout(()=>{
      el.classList.remove('visible');
      el.classList.add('hiding');
      setTimeout(()=>el.classList.add('gone'),350);
    },i*55));
  };
})();
</script>
</body>
</html>
