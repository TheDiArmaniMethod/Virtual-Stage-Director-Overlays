<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

#container{
  position:absolute;
  bottom:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:1600px;
  background:var(--bg-color);
  border-radius:20px;padding:50px;
  display:flex;align-items:center;justify-content:center;gap:50px;
  backdrop-filter:blur(10px);
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  animation:fadeInUp 0.6s ease-out;
}

/* Animated name badge icon */
#badge-icon{flex-shrink:0;width:130px;height:130px;position:relative;display:flex;align-items:center;justify-content:center}
.badge{
  width:120px;height:80px;background:#fff;border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:10px;animation:pulse 2s ease-in-out infinite;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.badge-name-line{width:70px;height:10px;background:rgba(45,140,255,0.5);border-radius:4px}
.badge-title-line{width:50px;height:7px;background:rgba(45,140,255,0.25);border-radius:4px}
.pencil{position:absolute;bottom:8px;right:8px;font-size:32px;animation:pencilWiggle 2s ease-in-out infinite}

#text-content{flex:1;color:#fff}
#headline{font-size:64px;font-weight:700;margin-bottom:18px;text-shadow:2px 2px 8px rgba(0,0,0,0.3);line-height:1.2}
#subtext{font-size:40px;font-weight:400;opacity:0.95;text-shadow:1px 1px 4px rgba(0,0,0,0.2);line-height:1.4}

/* Steps */
#steps{flex-shrink:0;display:flex;flex-direction:column;gap:16px}
.step-row{display:flex;align-items:center;gap:16px}
.step-num{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;font-weight:700;color:#fff;flex-shrink:0;
}
.step-text{font-size:26px;color:#fff;white-space:nowrap}

@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes pencilWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>
<div id="container">
  <div id="badge-icon">
    <div class="badge">
      <div class="badge-name-line"></div>
      <div class="badge-title-line"></div>
    </div>
    <div class="pencil">✏️</div>
  </div>

  <div id="text-content">
    <div id="headline">Please Rename Yourself in Zoom</div>
    <div id="subtext">Use your full name so everyone knows who you are</div>
  </div>

  <div id="steps">
    <div class="step-row">
      <div class="step-num">1</div>
      <div class="step-text">Click <strong>Participants</strong> in your toolbar</div>
    </div>
    <div class="step-row">
      <div class="step-num">2</div>
      <div class="step-text">Hover over <strong>your name</strong></div>
    </div>
    <div class="step-row">
      <div class="step-num">3</div>
      <div class="step-text">Click <strong>Rename</strong> and update it</div>
    </div>
  </div>
</div>
</body>
</html>
