<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

#container{
  position:absolute;
  bottom:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:1600px;
  background:var(--bg-color);
  border-radius:20px;padding:50px;
  display:flex;align-items:center;justify-content:center;gap:40px;
  backdrop-filter:blur(10px);
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  animation:fadeInUp 0.6s ease-out;
}

/* Animated video icon — recording light */
#camera-icon{flex-shrink:0;width:130px;display:flex;flex-direction:column;align-items:flex-start;gap:12px;position:relative}
.cam-body{
  width:100px;height:70px;background:#fff;border-radius:12px;
  position:absolute;top:25px;left:10px;
  animation:pulse 2s ease-in-out infinite;
}
.cam-lens{
  width:50px;height:50px;background:rgba(220,100,20,0.8);border-radius:50%;
  position:absolute;top:10px;left:25px;border:4px solid #fff;
}
.cam-lens-inner{width:28px;height:28px;background:rgba(255,255,255,0.35);border-radius:50%;position:absolute;top:11px;left:11px}
.cam-viewfinder{width:25px;height:20px;background:#fff;border-radius:4px;position:absolute;top:-8px;left:38px}
.cam-grip{width:30px;height:15px;background:#fff;border-radius:0 0 8px 8px;position:absolute;bottom:-5px;right:10px}
/* Recording dot */
.rec-dot{
  width:20px;height:20px;background:#ff3b3b;border-radius:50%;
  position:absolute;top:8px;right:8px;
  animation:recBlink 1.2s ease-in-out infinite;
  box-shadow:0 0 8px rgba(255,59,59,0.6);
}

#text-content{flex:1;color:#fff;padding-left:200px}
#headline{font-size:62px;font-weight:700;margin-bottom:16px;text-shadow:2px 2px 8px rgba(0,0,0,0.3);line-height:1.2}
#subtext{font-size:38px;font-weight:400;opacity:0.95;text-shadow:1px 1px 4px rgba(0,0,0,0.2);line-height:1.4}

#pointer{font-size:60px;animation:pointDown 1.5s ease-in-out infinite;filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.3))}

@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes recBlink{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes pointDown{0%,100%{transform:translateY(0)}50%{transform:translateY(10px)}}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>
<div id="container">
  <div id="camera-icon">
    <div style="width:130px;height:130px;position:relative;">
      <div class="cam-body">
        <div class="cam-lens">
          <div class="cam-lens-inner"></div>
        </div>
        <div class="rec-dot"></div>
      </div>
      <div class="cam-viewfinder"></div>
      <div class="cam-grip"></div>
    </div>
    <div id="pointer">👇</div>
  </div>

  <div id="text-content">
    <div id="headline">We'd Love to See Your Face! 😊</div>
    <div id="subtext">To turn on your camera, click the video icon at the bottom left of your Zoom Toolbar</div>
  </div>

</div>
</body>
</html>
