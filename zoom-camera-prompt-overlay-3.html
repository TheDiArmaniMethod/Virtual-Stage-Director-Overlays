<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

#container{
  position:absolute;
  bottom:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:1600px;
  background:var(--bg-color);
  border-radius:20px;padding:50px 60px;
  display:flex;align-items:center;gap:60px;
  backdrop-filter:blur(10px);
  border:3px solid rgba(45,140,255,0.4);
  box-shadow:0 10px 40px rgba(0,0,0,0.5),0 0 60px rgba(45,140,255,0.1);
  animation:fadeInUp 0.6s ease-out;
}

/* Camera icon — glowing */
#camera-icon{
  flex-shrink:0;width:130px;height:130px;
  display:flex;align-items:center;justify-content:center;
  font-size:96px;
  filter:drop-shadow(0 0 16px rgba(45,140,255,0.8));
  animation:iconGlow 2.5s ease-in-out infinite;
}

/* Left text */
#left{flex:1;border-right:1px solid rgba(255,255,255,0.1);padding-right:60px}
#headline{font-size:58px;font-weight:700;color:#fff;margin-bottom:16px;text-shadow:0 0 20px rgba(45,140,255,0.4);line-height:1.2}
#subtext{font-size:34px;color:rgba(255,255,255,0.75);line-height:1.5}

/* Right: shortcut + steps */
#right{flex-shrink:0;display:flex;flex-direction:column;gap:28px;padding-left:20px}

.shortcut-block{display:flex;flex-direction:column;gap:10px}
.shortcut-label{font-size:20px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px}
.keys{display:flex;align-items:center;gap:10px}
.key{
  background:rgba(45,140,255,0.15);
  border:1px solid rgba(45,140,255,0.5);
  border-bottom:3px solid rgba(45,140,255,0.7);
  border-radius:8px;padding:10px 20px;
  font-size:28px;font-weight:700;color:#fff;
  box-shadow:0 0 12px rgba(45,140,255,0.2);
}
.plus{font-size:26px;color:rgba(255,255,255,0.4)}

.divider{height:1px;background:rgba(255,255,255,0.1)}

.find-it{font-size:22px;color:rgba(255,255,255,0.6);line-height:1.5}
.find-it strong{color:#5aafff}

@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes iconGlow{0%,100%{filter:drop-shadow(0 0 16px rgba(45,140,255,0.6))}50%{filter:drop-shadow(0 0 32px rgba(45,140,255,1))}}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>
<div id="container">
  <div id="camera-icon">📹</div>

  <div id="left">
    <div id="headline">Please Enable Your Camera</div>
    <div id="subtext">Seeing each other makes our time together so much engaging and interactive for us all</div>
  </div>

  <div id="right">
    <div class="shortcut-block">
      <div class="shortcut-label">Windows shortcut</div>
      <div class="keys">
        <div class="key">Alt</div><div class="plus">+</div><div class="key">V</div>
      </div>
    </div>
    <div class="shortcut-block">
      <div class="shortcut-label">Mac shortcut</div>
      <div class="keys">
        <div class="key">⌘</div><div class="plus">+</div><div class="key">⇧</div><div class="plus">+</div><div class="key">V</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="find-it">Or click the <strong>video icon</strong><br>at the bottom left of your Zoom window</div>
  </div>
</div>
</body>
</html>
