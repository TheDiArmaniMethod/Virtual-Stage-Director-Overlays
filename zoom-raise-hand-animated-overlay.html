<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

/* ── Instruction banner ─────────────────────────────── */
#banner{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%, calc(-50% + 50px));
  background:var(--bg-color);
  border-radius:20px;padding:32px 60px;
  display:flex;align-items:center;gap:28px;
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);
  animation:fadeInDown 0.6s ease-out;
  white-space:nowrap;
}
#banner-icon{font-size:56px;animation:wave 2s ease-in-out infinite}
#banner-text{color:#fff}
#banner-headline{font-size:48px;font-weight:700;text-shadow:2px 2px 8px rgba(0,0,0,0.3);margin-bottom:8px}
#banner-sub{font-size:30px;opacity:0.92;text-shadow:1px 1px 4px rgba(0,0,0,0.2)}

/* ── Simulated Zoom Toolbar ──────────────────────────── */
#zoom-toolbar{
  position:absolute;
  bottom:50px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,0.96);
  border-radius:16px;padding:10px 20px;
  display:flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  animation:fadeInUp 0.7s ease-out;
}
.tb-btn{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 16px;border-radius:10px;gap:6px;
  min-width:80px;
}
.tb-btn svg{width:28px;height:28px;fill:#fff}
.tb-label{font-size:13px;color:#fff;white-space:nowrap}
.tb-sep{width:1px;height:50px;background:rgba(255,255,255,0.15);margin:0 4px}

/* Reactions button — glowing */
#reactions-btn{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
}

/* ── Reactions panel ─────────────────────────────────── */
#reactions-panel{
  position:absolute;
  bottom:170px;left:50%;transform:translateX(-50%);
  background:rgba(30,30,30,0.98);
  border-radius:20px;padding:24px 28px;
  display:flex;gap:12px;align-items:center;
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 12px 48px rgba(0,0,0,0.7);
  animation:fadeInUp 0.5s ease-out 0.3s both;
}

.reaction-btn{
  width:76px;height:76px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;
  border:2px solid transparent;
  position:relative;
  opacity:0.5;
}

/* Raise hand — prominently highlighted */
#raise-hand-btn{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 24px;border-radius:14px;
  background:rgba(255,255,255,0.15);
  border:3px solid rgba(255,255,255,0.9);
  box-shadow:0 0 30px rgba(255,255,255,0.3);
  animation:raiseHandGlow 1.8s ease-in-out infinite;
  position:relative;
  cursor:pointer;
}
#raise-hand-btn .rh-emoji{font-size:52px;animation:wave 1.5s ease-in-out infinite}
#raise-hand-btn .rh-label{font-size:18px;color:#fff;font-weight:700;white-space:nowrap}

/* Arrow pointing down at raise hand */
#arrow-down{
  position:absolute;
  top:calc(100% + 8px);
  left:50%;transform:translateX(-50%);
  font-size:28px;
  animation:arrowBounce 1.2s ease-in-out infinite;
  filter:drop-shadow(0 2px 6px rgba(255,255,255,0.6));
}

/* "You're next!" callout that appears after hand raise */
#next-callout{
  position:absolute;
  top:-70px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,0.95);
  color:#1a1a1a;
  font-size:20px;font-weight:700;
  padding:10px 20px;border-radius:20px;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
  animation:calloutPop 3s ease-in-out infinite 2s;
  opacity:0;
}

#panel-divider{width:1px;background:rgba(255,255,255,0.15);align-self:stretch;margin:0 4px}

/* ── Animations ─────────────────────────────────────── */
@keyframes fadeInDown{from{opacity:0;transform:translate(-50%,calc(-70% + 50px))}to{opacity:1;transform:translate(-50%,calc(-50% + 50px))}}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes wave{0%,100%{transform:rotate(0deg)}15%{transform:rotate(-20deg)}30%{transform:rotate(15deg)}45%{transform:rotate(-10deg)}60%{transform:rotate(5deg)}75%{transform:rotate(0deg)}}
@keyframes raiseHandGlow{0%,100%{box-shadow:0 0 20px rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.7)}50%{box-shadow:0 0 40px rgba(255,255,255,0.5);border-color:rgba(255,255,255,1)}}
@keyframes arrowBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
@keyframes calloutPop{0%,100%{opacity:0;transform:translateX(-50%) translateY(4px)}10%,80%{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>

<div id="banner">
  <div id="banner-icon">✋</div>
  <div id="banner-text">
    <div id="banner-headline">Want to Speak? Raise Your Hand!</div>
    <div id="banner-sub">Click the glowing Raise Hand button below — the host will invite you when it's your turn</div>
  </div>
</div>

    <div class="tb-label">Participants</div>
  </div>
  <div class="tb-btn">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>

  <div class="tb-btn" id="reactions-btn">
    <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>

  </div>
  <div class="tb-sep"></div>
  <div class="tb-btn">
    <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
    <div class="tb-label">Share</div>
  </div>
</div>

<div id="reactions-panel">
  <div class="reaction-btn">👍</div>
  <div class="reaction-btn">❤️</div>

</body>
</html>
