<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.7.6 -->
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1920px;height:1080px;background:transparent;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}

#container{
  position:absolute;
  bottom:60px;left:50%;transform:translateX(-50%);
  width:90%;max-width:1600px;
  background:var(--bg-color);
  border-radius:20px;padding:50px 60px;
  display:flex;align-items:center;gap:60px;
  backdrop-filter:blur(10px);
  border:3px solid rgba(255,255,255,0.3);
  box-shadow:0 10px 40px rgba(0,0,0,0.3);
  animation:fadeInUp 0.6s ease-out;
}

/* Left: icon + text */
#left{flex:1;display:flex;align-items:center;gap:40px;border-right:2px solid rgba(255,255,255,0.2);padding-right:60px}
#chat-icon{font-size:100px;animation:bounce 2s ease-in-out infinite;flex-shrink:0}
#text-content{color:#fff}
#headline{font-size:56px;font-weight:700;margin-bottom:14px;text-shadow:2px 2px 8px rgba(0,0,0,0.3);line-height:1.2}
#subtext{font-size:34px;opacity:0.92;line-height:1.4;text-shadow:1px 1px 4px rgba(0,0,0,0.2)}

/* Right: keyboard shortcuts */
#right{flex-shrink:0;display:flex;flex-direction:column;gap:28px;padding-left:20px}
.platform{display:flex;flex-direction:column;gap:12px}
.platform-name{font-size:22px;font-weight:600;color:rgba(255,255,255,0.75);text-transform:uppercase;letter-spacing:1px}
.keys{display:flex;align-items:center;gap:12px}

.key{
  background:rgba(255,255,255,0.15);
  border:2px solid rgba(255,255,255,0.5);
  border-bottom:4px solid rgba(0,0,0,0.25);
  border-radius:10px;
  padding:12px 22px;
  font-size:30px;font-weight:700;color:#fff;
  text-shadow:1px 1px 2px rgba(0,0,0,0.3);
  animation:keyPress 3s ease-in-out infinite;
  position:relative;top:0;
}
.key:nth-child(1){animation-delay:0s}
.key:nth-child(3){animation-delay:0.15s}
.key:nth-child(5){animation-delay:0.3s}

.plus{font-size:30px;color:rgba(255,255,255,0.6);font-weight:300;flex-shrink:0}

@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes keyPress{
  0%,70%,100%{top:0;border-bottom-width:4px;background:rgba(255,255,255,0.15)}
  75%{top:3px;border-bottom-width:1px;background:rgba(255,255,255,0.25)}
  80%{top:0;border-bottom-width:4px;background:rgba(255,255,255,0.15)}
}
</style>
  <script>
    /* ── Brand colour via URL parameter ─────────────────────────────────────
       Usage: ?bgColor=220901&bgOpacity=95
       bgColor  : hex colour without # (default: 220901 — brand brown)
       bgOpacity: 0-100 (default: 95)
       Examples:
         Default brand brown : ?bgColor=220901&bgOpacity=95
         Zoom blue           : ?bgColor=2D8CFF&bgOpacity=95
         Dark slate          : ?bgColor=14141E&bgOpacity=96
         Forest green        : ?bgColor=108250&bgOpacity=95
    ─────────────────────────────────────────────────────────────────────── */
    (function() {
      var qs = new URLSearchParams(location.search);
      var hex = (qs.get('bgColor') || '220901').replace('#', '');
      var opacity = Math.min(100, Math.max(0, parseFloat(qs.get('bgOpacity') || '95'))) / 100;
      var r = parseInt(hex.substring(0,2), 16);
      var g = parseInt(hex.substring(2,4), 16);
      var b = parseInt(hex.substring(4,6), 16);
      var rgba = 'rgba(' + r + ',' + g + ',' + b + ',' + opacity.toFixed(2) + ')';
      document.documentElement.style.setProperty('--bg-color', rgba);
    })();
  </script>
</head>
<body>
<div id="container">
  <div id="left">
    <div id="chat-icon">💬</div>
    <div id="text-content">
      <div id="headline">Open Chat — Ask Questions Any Time</div>
      <div id="subtext">Use the keyboard shortcut to open or close the chat panel instantly</div>
    </div>
  </div>

  <div id="right">
    <div class="platform">
      <div class="platform-name">Windows</div>
      <div class="keys">
        <div class="key">Alt</div>
        <div class="plus">+</div>
        <div class="key">H</div>
      </div>
    </div>
    <div class="platform">
      <div class="platform-name">Mac</div>
      <div class="keys">
        <div class="key">⌘</div>
        <div class="plus">+</div>
        <div class="key">⇧</div>
        <div class="plus">+</div>
        <div class="key">H</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
