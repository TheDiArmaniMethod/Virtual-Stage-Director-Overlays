<!DOCTYPE html>
<!-- Virtual Stage Director v1.6.5.2 -->
<html>
<head>
    <meta charset="utf-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: transparent;
            font-family: 'Arial Black', Arial, sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #timer-container {
            border-radius: 30px;
            padding: 60px 100px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            transition: background 0.5s ease;
        }

        #timer-display {
            font-size: 180px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 10px;
            font-variant-numeric: tabular-nums;
        }

        #banner {
            display: none;
            font-size: 120px;
            font-weight: bold;
            text-align: center;
            letter-spacing: 5px;
            white-space: nowrap;
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: scale(1); }
            to   { opacity: 0; transform: scale(0.8); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); }
            to   { opacity: 1; transform: scale(1); }
        }

        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="timer-container">
        <div id="timer-display">00:00</div>
        <div id="banner"></div>
    </div>

    <script>
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // Parses a 6-digit (RRGGBB) or 8-digit (RRGGBBAA) hex string.
        // defaultAlpha is used when no alpha channel is encoded.
        function hexToRgba(hex, defaultAlpha) {
            hex = hex.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const a = hex.length === 8 ? parseInt(hex.substr(6, 2), 16) / 255 : defaultAlpha;
            return {
                r, g, b,
                a: parseFloat(a.toFixed(4)),
                css: `rgba(${r}, ${g}, ${b}, ${parseFloat(a.toFixed(4))})`
            };
        }

        // --- URL parameters ---
        const minutesParam  = getUrlParameter('minutes');
        const secondsParam  = getUrlParameter('seconds');
        const bgHex         = getUrlParameter('bg')      || '000000CC'; // RRGGBBAA; CC ≈ 0.8 opacity
        const textHex       = getUrlParameter('text')    || 'ffffff';
        const bannerMessage = getUrlParameter('message') || "Time's Up!";

        const startMinutes = minutesParam !== null ? parseInt(minutesParam) : 5;
        const startSeconds = secondsParam !== null ? parseInt(secondsParam) : 0;

        let totalSeconds    = (startMinutes * 60) + startSeconds;
        let remainingSeconds = totalSeconds;

        if (totalSeconds <= 0) {
            totalSeconds     = 300;
            remainingSeconds = 300;
        }

        // --- Color setup ---
        const bgColor      = hexToRgba(bgHex,    0.8);   // fallback alpha 0.8 for legacy 6-digit bg
        const textColor    = hexToRgba(textHex,  1.0);
        // Warning color inherits the same alpha as the configured background
        const warningColor = { r: 148, g: 27, b: 12, a: bgColor.a,
                               css: `rgba(148, 27, 12, ${bgColor.a})` };

        const container = document.getElementById('timer-container');
        const display   = document.getElementById('timer-display');
        const banner    = document.getElementById('banner');

        function applyTextColor(el, color) {
            el.style.color = color.css;
            el.style.textShadow = `0 0 30px rgba(${color.r}, ${color.g}, ${color.b}, 0.5),
                                   0 0 60px rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`;
        }

        container.style.background = bgColor.css;
        applyTextColor(display, textColor);
        applyTextColor(banner,  textColor);

        // --- Timer logic ---
        let warningTriggered = false;
        let timerInterval;
        let isPaused = false;

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateDisplay() {
            display.textContent = formatTime(remainingSeconds);
        }

        function showBanner() {
            display.classList.add('fade-out');
            setTimeout(function () {
                display.style.display = 'none';
                banner.textContent = bannerMessage;
                banner.style.display = 'block';
                banner.classList.add('fade-in');
            }, 500);
        }

        function countdown() {
            if (remainingSeconds > 0) {
                remainingSeconds--;
                updateDisplay();

                if (!warningTriggered && remainingSeconds <= Math.ceil(totalSeconds * 0.1)) {
                    warningTriggered = true;
                    container.style.background = warningColor.css;
                }
            } else {
                clearInterval(timerInterval);
                showBanner();
            }
        }

        updateDisplay();

        setTimeout(function () {
            timerInterval = setInterval(countdown, 1000);
        }, 100);

        document.addEventListener('keydown', function (e) {
            if (e.key === 'r') {
                remainingSeconds = totalSeconds;
                warningTriggered = false;
                container.style.background = bgColor.css;
                display.style.display   = 'block';
                display.classList.remove('fade-out');
                banner.style.display    = 'none';
                banner.classList.remove('fade-in');
                updateDisplay();
            } else if (e.key === 'p') {
                if (isPaused) {
                    timerInterval = setInterval(countdown, 1000);
                } else {
                    clearInterval(timerInterval);
                }
                isPaused = !isPaused;
            }
        });
    </script>
</body>
</html>
